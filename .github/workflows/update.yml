name: Update Brave Filter

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  update-filter:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run script
        run: |
          set -e
          python update_filter.py

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add brave_list_kr.txt

          if ! git diff --staged --quiet; then
            if [ -f brave_list_kr.txt ]; then
              VERSION=$(grep "! Version:" brave_list_kr.txt | head -n 1 | awk '{print $3}')
            else
              VERSION="unknown"
            fi

            git commit -m "Update: List-KR unified v$VERSION 적용 완료"
            git push
          else
            echo "No upstream changes."
          fi
